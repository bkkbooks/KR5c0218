body:
  text: 太上老君養生訣太清服氣口訣莊周氣訣解太上老君養生訣華陀授廣陵吳普五禽第一老君曰古之仙者為導引之事能鳥申挽引膚體動諸關節以求難老名曰五禽之戲挽引蹄足以當導引體中不快起作一禽之戲故令汗出因止以身體輕便普施行之年九百餘歲耳目聰明牙齒完堅夫為導者甚易行者甚希悲哉虎戲四肢距地前三躑却三躑長引膚乍前乍却仰天即返伏距地行前却各七熊戲正仰以兩手抱膝下舉頭左劈地七右亦七躑地手左右托地各七鹿戲四肢距地引項反顧左三右三左申右腳右申左腳左右申縮亦三止猿戲攀物自懸申縮身體上下七以腳拘物倒懸左七右七坐左右手拘腳五按各七鳥戲立起翹一足申兩臂掦扇用力各二七坐申腳起挽足指各七申縮兩臂各七夫五禽戲法任力為之以汗出為限輕身消穀氣益氣力除百病陀行之年過萬嵗教傳弟子廣陵吳普亦得延年長壽服氣吐納六氣第二呬字呬主肺肺連五藏受風即鼻塞有疾作呬吐納治之呵字呵主心心連舌五藏心熱舌乾有疾作呵吐納治之呼字呼主脾脾連脣論云脾溫即脣燋有疾作呼吐納治之噓字噓主肝肝連目論云肝盛即目赤有疾作噓吐納治之吹字吹主腎腎連耳論云腎虛即耳聾有疾作吹吐納治之嘻字嘻主三焦有疾作嘻吐納治之養生真訣第三上士修之全真延命中士修之無諸災咎下士修之免身枉橫愚者輕之早殞性命老君曰一人之身一國之象也胸腹之設猶宫室也肢體之位猶郊境也骨節之分猶百官也腠理之間猶四衢也神猶君也血猶臣也氣猶民也能治其身亦如明君能理國焉夫愛其民所以安其國愛其氣所以全其身民弊則國亡氣竭即身謝是故至人上士當施醫於未病之前不追於既敗之後故知生難保而易喪氣難清而易濁若能審機權可以安社稷制嗜欲可以保性命且夫善攝生者要當先除六害然後可以保性命延駐百年何者是也一者薄名利二者禁聲色三者廉貨財四者捐滋味五者除佞妄六者去妬嫉去此六者則修生之道無不成耳若此六者不除蓋未見其益雖心希妙理口念真經咀嚼英華呼吸景象不能補其短促蓋捐於其本而妄求其末深可誡哉所以保其真者當須少思少念少笑少言少喜少怒少樂少愁少好少惡少事少機夫多思即神傷多念即心勞多笑即藏府上翻多言即氣海虛脫多喜即膀胱納客風多怒即腠理奔浮多樂即心神邪蕩多愁即髮鬚燋枯多好即志氣傾覆多惡即精爽奔騰多事即筋脈乾急多機即智慧沈迷斯乃伐人之生甚於斤斧蝕人之性猛於豺狼無久坐久行久視久聽不得強食不飢而食即脾勞不得強飮不渴而飲則胃漲體欲常勞食欲半飽勞勿過極飽勿過半冬即朝莫空心夏即夜勿飽食早起勿在雞鳴前晚起不在日出後心內澄則真神守其位氣內定則邪物去其身身行欺詐即神悲行爭競則神沮輕侮於人當減算數殺害於物必當中夭行一善即魂神恱行一惡則魄神歡常以寬泰自居恬寞自守即形神婁靜生籙必書其名死藉必削其咎養生之理盡在於斯矣服氣訣老君曰玄牝門天地根綿綿若存用之不動言口鼻天地之門以吐納隂陽生死之氣每旦面向午展兩手於膝上除徐按捺兩節口吐濁氣鼻引清氣所謂吐故納新是蹙氣良久徐徐吐之仍以手左右上下前後拓取氣之時意想太和元氣下入毛際流於五藏四肢皆受其潤如山之納雲如地之受澤若氣通便覺腹中汨汨轉動若得十通即覺身體潤懌而色光澤耳目聰眀令貪有味氣力加倍諸疾去矣又法夜半後日中前氣生可為之餘時氣死即不須調服調氣了之時須牀鋪厚軟枕髙下共身平仰卧舒展腳握固去身四五寸兩腳亦去四五寸微微鼻引太陽氣從鼻入以意送此氣通遍身體即閉氣至極然後細細從口吐之勿令耳聞吐氣之聲若患寒熱及瘴患腳腫等疾不問時節即須調之若當日不愈明日更調不過三兩日必愈若患心中冷痛呼而吐之熱既吹之若患腳痛即噓而吐之肺若痛即呬而吐之夜半後二十四調之雞鳴時十八平旦十二日出十二多調彌佳欲作此法先導引十八勢按摩二十四人仗導引以去五藏病心病者體有冷熱相法心色赤夢中見人著赤衣持刀杖及火來怖人療法用呼吹二氣去之呼去冷吹去熱肺病者胸背脹滿四肢煩悶相法肺色白夢見著白衣人男女作親婦人共相抱持或作父母兄弟妻子療法呵氣去之肝病者愁憂不樂頭眼疼痛相法肝色青夢見著青衣人把青刀杖或獅子虎狼來怖人療法用噓氣去之脾病者體上遊風習習惰悶疼痛相法脾色黃夢見黃物或作小兒繫腋人或如旋風繞人療法用嘻氣去之腎病者體冷而隂衰相法腎色黑夢見著黑衣人持刀杖來怖人療法用呬氣去之每作皆三十六通但能習之不愈者仍須左右導引按摩論曰形者神之主氣者神之命是以形神所假資氣而存故調暢四肢周遊六府苟有壅滯便即生疾是故人體虛無成之者氣若調息得所即諸疾自消若吐納乖方乃衆疾咸起善攝生者先須知調氣之法焉所謂呼吸生先期於壽而樂有喜斯之謂歟太上老君養生訣終
